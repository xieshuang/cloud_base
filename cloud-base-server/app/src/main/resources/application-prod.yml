spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:prod-db}:3306/cloud_base?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 20
      maximum-pool-size: 100

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

shiro:
  web:
    enabled: true

swagger:
  enabled: false

logging:
  level:
    root: WARN
    com.cloudbase: INFO
  file:
    name: /var/log/cloud-base/server.log
    max-size: 100MB
    max-history: 30
